<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI数据分析助手 | 武老师快答</title>
    <link rel="stylesheet" href="/css/style.css?v=1781767557">
</head>
<body>

    <!-- 四角定位标记（调试用） -->
    <div style="position:fixed;top:4px;left:4px;width:14px;height:14px;background:#ef4444;border-radius:3px;z-index:9999;font-size:9px;color:#fff;text-align:center;line-height:14px">1</div>
    <div style="position:fixed;top:4px;right:4px;width:14px;height:14px;background:#10b981;border-radius:3px;z-index:9999;font-size:9px;color:#fff;text-align:center;line-height:14px">2</div>
    <div style="position:fixed;bottom:4px;left:4px;width:14px;height:14px;background:#f59e0b;border-radius:3px;z-index:9999;font-size:9px;color:#fff;text-align:center;line-height:14px">3</div>
    <div style="position:fixed;bottom:4px;right:4px;width:14px;height:14px;background:#3b82f6;border-radius:3px;z-index:9999;font-size:9px;color:#fff;text-align:center;line-height:14px">4</div>

    <!-- 会话侧栏（折叠式） -->
    <aside id="session-sidebar" class="session-sidebar">
        <div class="session-sidebar-header">
            <button id="new-session-btn" class="btn-session-new">+ 新会话</button>
        </div>
        <div id="session-list" class="session-list"></div>
        <div class="session-sidebar-footer">
            <div id="session-token-display" class="session-token-bar">
                <span class="bar-label">上下文: 0%</span>
                <div class="token-fill"><div class="token-fill-inner" style="width:0%"></div></div>
            </div>
            <span id="session-count">0 个会话</span>
        </div>
    </aside>

    

    <!-- 主区域 -->
    <main class="main-area">
        <!-- 紧凑 Header -->
        <header class="top-bar">
            <button id="session-toggle" class="btn-icon" title="会话列表">☰</button>
            <div class="header-center">
                <span class="header-title">AI数据分析助手</span>
                <span class="header-subtitle">武老师快答APP</span>
            </div>
            <div class="header-actions">
                <span id="token-usage" class="token-indicator">--</span>
                <button id="new-chat-header-btn" class="btn-new-chat" title="新建对话">+ 新对话</button>
            </div>
        </header>

        <!-- 功能标签栏 -->
        <div class="feature-tabs" id="feature-tabs">
            <button class="feature-tab active" data-feature="all">全部</button>
            <button class="feature-tab" data-feature="inspect">🔍 数据核查</button>
            <button class="feature-tab" data-feature="analyze">📊 智能分析</button>
            <button class="feature-tab" data-feature="method">📈 专业方法</button>
            <button class="feature-tab" data-feature="advice">💡 行动建议</button>
            <button id="scan-db-btn" class="btn-scan-db" title="扫描数据库自动发现表结构">🔍 扫描数据库</button>
        </div>

        <!-- 对话区域 -->
        <div id="scan-status" class="scan-status" style="display:none">
            <div class="scan-status-bar">
                <span class="scan-spinner"></span>
                <span id="scan-status-text">正在扫描数据库...</span>
            </div>
        </div>
        <div id="chat-container" class="chat-container">
            <!-- 快捷提问标签 -->
            <div class="quick-tags" id="quick-tags">
                <span class="quick-tag" data-query="昨天日活多少">昨天日活多少</span>
                <span class="quick-tag" data-query="最近7天新增趋势">最近7天新增趋势</span>
                <span class="quick-tag" data-query="核心活跃率比变化多少">核心活跃率比变化</span>
            </div>
        </div>

        <!-- 底部输入区 -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="query-input" placeholder="输入您的数据查询需求..." rows="1"></textarea>
                <button id="send-btn" class="btn-send" title="发送 (Enter)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
            <div class="input-hint">Enter 发送 · Shift+Enter 换行</div>
            <span id="active-skills-hint" class="skills-hint"></span>
        </div>
    </main>

    <!-- 技能面板（右侧，按需显示） -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2>已激活方法</h2>
            </div>
            <div id="skills-list" class="skills-list">
                <div class="activated-skills-empty">
                    <div class="empty-icon">🔍</div>
                    <div>分析方法会在分析过程中自动显示</div>
                </div>
            </div>
        </aside>


    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/js/app.js?v=1781767557"></script>
</body>
</html>
