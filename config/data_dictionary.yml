# ===================================================================
# Skadi Data Dictionary v2 — 基于业务分析卡片知识库
# ===================================================================
# 来源: cards/ (7张业务分析卡片)
# 覆盖: 用户/留存/会员/图书/答疑/营收/广告 七大业务域
# 42张已审核表，含数据源合约（必用/禁用/辅助）

database:
  type: starrocks
  name: your_database

tables:
  # ===================================================================
  # 1. 用户与日活
  # ===================================================================
  - name: dws_edu_ubb_bhv_app_daily_active_user
    domain: 用户
    role: 必用
    description: "全平台日活(DAU)，N行。user_id + active_date"
    partition_key: server_day
    partition_type: DATE
    has_today_data: true
    fields:
      - name: server_day
        type: DATE
        description: "活跃日期"
      - name: user_id
        type: BIGINT
        description: "用户ID"
      - name: login_cnt
        type: BIGINT
        description: "登录次数"
    typical_queries:
      - description: "最近7天DAU趋势"
        sql: |
          SELECT server_day, COUNT(DISTINCT user_id) AS dau
          FROM dws_edu_ubb_bhv_app_daily_active_user
          WHERE server_day BETWEEN DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY) AND CURRENT_DATE()
          GROUP BY server_day ORDER BY server_day
    baseline:
      daily_avg: 11700
      weekday_avg: 7200
      weekend_avg: 14000
      monday_avg: 8240
      description: "K12教育产品，30天均值约1.17万。周末(周六日)显著高于工作日(周一至周五~7200)。周一略高(8240)因周末回流。对比时使用同星期几基线而非全局均值。"

  - name: ods_edu_ubb_usr_app_user_user
    domain: 用户
    role: 必用
    description: "用户主表，N行。user_id + province + grade_id"
    partition_key: created_time
    partition_type: DATETIME
    has_today_data: true
    fields:
      - name: user_id
        type: BIGINT
        description: "用户唯一标识"
      - name: province
        type: VARCHAR
        description: "省份"
      - name: grade_id
        type: INT
        description: "年级ID"
      - name: created_time
        type: DATETIME
        description: "注册时间"

  - name: dwd_edu_mrg_usr_new_user
    domain: 用户
    role: 必用
    description: "新增用户明细，N行。按日期+渠道分组"
    partition_key: date
    partition_type: DATE
    has_today_data: true
    fields:
      - name: user_id
        type: BIGINT
        description: "用户ID"
      - name: date
        type: DATE
        description: "注册日期"
      - name: province
        type: VARCHAR
        description: "省份"
      - name: city
        type: VARCHAR
        description: "城市"
    typical_queries:
      - description: "最近7天新增趋势"
        sql: |
          SELECT date, COUNT(DISTINCT user_id) AS new_users
          FROM dwd_edu_mrg_usr_new_user
          WHERE date BETWEEN DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY) AND CURRENT_DATE()
          GROUP BY date ORDER BY date

  - name: dws_edu_ubb_usr_app_province
    domain: 用户
    role: 辅助
    description: "省份用户汇总，仅N行"
    fields:
      - name: province
        type: VARCHAR
      - name: user_count
        type: BIGINT

  - name: dws_edu_bhv_user_device_type_daily
    domain: 用户
    role: 辅助
    description: "用户设备类型日统计，N行"

  # ===================================================================
  # 2. 用户留存与流失
  # ===================================================================
  - name: ads_app_user_lost_cycle
    domain: 留存
    role: 必用
    description: "用户流失分析(优先使用)，N行。已预计算流失周期"
    fields:
      - name: user_id
        type: BIGINT
      - name: last_active_date
        type: DATE
      - name: lost_cycle
        type: VARCHAR

  - name: ads_edu_tifen_active_user_lost_cycle
    domain: 留存
    role: 辅助
    description: "提分智教用户流失分析，N行"

  - name: dws_edu_tifen_user_active_lifecycle_daily
    domain: 留存
    role: 辅助
    description: "提分智教用户生命周期日表"

  - name: dws_edu_qna_user_retention_daily
    domain: 留存
    role: 辅助
    description: "答疑用户留存，N行"

  # ===================================================================
  # 3. 提分智教会员
  # ===================================================================
  - name: dwd_edu_ubb_usr_tifen_member
    domain: 会员
    role: 必用
    description: "提分智教会员明细(DWD)。user_id + member_type + start_date + end_date"
    fields:
      - name: user_id
        type: BIGINT
      - name: member_type
        type: VARCHAR
        description: "会员类型"
      - name: start_date
        type: DATE
        description: "会员开始日期"
      - name: end_date
        type: DATE
        description: "会员到期日期"
    typical_queries:
      - description: "当前有效会员数"
        sql: |
          SELECT COUNT(DISTINCT user_id) AS current_members
          FROM dwd_edu_ubb_usr_tifen_member
          WHERE end_date >= CURDATE()

  - name: dws_edu_ubb_member_active_m
    domain: 会员
    role: 辅助
    description: "会员月活跃，仅N行"

  - name: dws_edu_learning_progress_summary_d
    domain: 会员
    role: 辅助
    description: "学习进度汇总，N行"

  - name: dwd_edu_tifen_zbk_learning_progress
    domain: 会员
    role: 辅助
    description: "中考帮学习进度，N行"

  - name: dwd_edu_tifen_app_exam_paper
    domain: 会员
    role: 辅助
    description: "试卷使用记录，N行"

  - name: ods_edu_ubb_mkt_homework_prod_member_change
    domain: 会员
    role: 辅助
    description: "会员变更流水"

  # ===================================================================
  # 4. 图书激活
  # ===================================================================
  - name: ods_edu_ubb_bhv_homework_prod_books_user
    domain: 图书
    role: 必用
    description: "用户图书激活，N行。books_id + yid(用户) + is_start_rights"
    fields:
      - name: books_id
        type: BIGINT
        description: "图书ID"
      - name: yid
        type: VARCHAR
        description: "用户标识(注意:不是user_id)"
      - name: is_start_rights
        type: TINYINT
        description: "权益是否激活(1=已激活)"
      - name: create_time
        type: DATETIME
        description: "激活时间"

  - name: ods_edu_ubb_smt_homework_prod_books
    domain: 图书
    role: 必用
    description: "图书主表。id + name + grade_name + study_stage_name"

  - name: ods_edu_ubb_ord_homework_prod_books_activation_code
    domain: 图书
    role: 辅助
    description: "激活码明细，N行"

  - name: dws_edu_ubb_bhv_user_book_funnel_status
    domain: 图书
    role: 辅助
    description: "图书转化漏斗(DWS汇总)"

  - name: dwd_edu_mrg_bhv_books_user_detail
    domain: 图书
    role: 辅助
    description: "图书用户明细宽表"

  - name: dws_edu_ubb_bhv_book_right_usernum
    domain: 图书
    role: 禁用
    description: "⚠️ 权益汇总表，仅N行！不可按series拆分"

  # ===================================================================
  # 5. 答疑
  # ===================================================================
  - name: dwd_edu_bhv_manual_answer_session_combined
    domain: 答疑
    role: 必用
    description: "答疑会话宽表(优先使用，替代ODS)。user_id + session_id + duration"
    fields:
      - name: user_id
        type: BIGINT
      - name: session_id
        type: VARCHAR
        description: "会话ID"
      - name: create_time
        type: DATETIME
      - name: duration
        type: INT
        description: "会话时长"

  - name: dwd_edu_ubb_ord_answer_purchase_detail
    domain: 答疑
    role: 必用
    description: "答疑购买明细。user_id + order_no + amount"

  - name: dwd_edu_ubb_ord_answer_refund_detail
    domain: 答疑
    role: 辅助
    description: "答疑退款明细(含user_id，与通用退款表不同)"

  - name: dws_edu_ubb_answer_pay_path_detail
    domain: 答疑
    role: 辅助
    description: "答疑付费路径。user_id + pay_path + step"

  - name: dws_edu_dayi_user_login_daily_stats
    domain: 答疑
    role: 辅助
    description: "答疑用户登录日统计"

  # ===================================================================
  # 6. 营收
  # ===================================================================
  - name: dws_edu_mrg_mkt_revenue_day_wide
    domain: 营收
    role: 必用
    description: "收入统计日表。d_date + project_name + total_income(推荐使用)"

  - name: dwd_edu_mrg_mkt_order_date
    domain: 营收
    role: 必用
    description: "订单宽表(核心)。user_id + order_no + amount + order_date + project_name"
    fields:
      - name: user_id
        type: BIGINT
      - name: order_no
        type: VARCHAR
        description: "订单号(可用于JOIN退款表)"
      - name: amount
        type: DECIMAL
      - name: order_date
        type: DATE
      - name: project_name
        type: VARCHAR

  - name: dwd_edu_mrg_mkt_goods_refund_order
    domain: 营收
    role: 必用
    description: "⚠️ 退款明细(无user_id列)。含order_no + refund_amount，需JOIN dwd_edu_mrg_mkt_order_date ON order_no获取user_id"
    fields:
      - name: order_no
        type: VARCHAR
        description: "订单号(JOIN键)"
      - name: refund_amount
        type: DECIMAL
      - name: refund_date
        type: DATE

  - name: dwd_edu_mrg_mkt_goods_order
    domain: 营收
    role: 辅助
    description: "商品订单明细，N行"

  - name: dws_edu_ubb_usr_consume_stats
    domain: 营收
    role: 辅助
    description: "用户消费统计"

  # ===================================================================
  # 7. 广告
  # ===================================================================
  - name: dws_edu_mkt_ad_position_effect_daily
    domain: 广告
    role: 必用
    description: "广告位效果日表(优先使用)。ad_position_id + exposure + click + d_date"

  - name: dwd_edu_bhv_maidian_user_event_marketing_daily
    domain: 广告
    role: 必用
    description: "营销事件日表(DWD)。user_id + event_type + element_value"

  - name: dwd_edu_bhv_maidian_ad_click_daily
    domain: 广告
    role: 辅助
    description: "广告点击日表，N行"

  - name: ods_edu_ubb_mkt_app_common_ad_info_config
    domain: 广告
    role: 辅助
    description: "广告配置表(广告位名称映射)"

# ===================================================================
# 关键业务规则 (从卡片提取)
# ===================================================================
business_rules:
  - rule: "退款表无user_id"
    detail: "dwd_edu_mrg_mkt_goods_refund_order 无user_id列。按用户分析退款需 JOIN dwd_edu_mrg_mkt_order_date ON order_no"
    severity: critical
  - rule: "图书用户标识非user_id"
    detail: "ods_edu_ubb_bhv_homework_prod_books_user 的用户列名为 yid，不是 user_id"
    severity: warning
  - rule: "权益汇总表不可拆分"
    detail: "dws_edu_ubb_bhv_book_right_usernum 仅N行汇总数据，不可按系列/时间拆分。用 ods_edu_ubb_bhv_homework_prod_books_user 替代(412万行)"
    severity: critical
  - rule: "优先用DWD宽表而非ODS原始表"
    detail: "答疑分析优先用 dwd_edu_bhv_manual_answer_session_combined，而非 ods_edu_ubb_bhv_app_answer_question_t_session_message(214万行ODS)"
    severity: info
  - rule: "用户流失用预计算表"
    detail: "优先使用 ads_app_user_lost_cycle(190万行)，已预计算流失周期"
    severity: info
  - rule: "年级用grade_name"
    detail: "仅从 grade_name 获取。'小升初'等效'六年级' → IN ('六年级','小升初')"
    severity: info
